org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
org.gradle.caching=true
android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official

# ===== 版本号单一来源 =====
# 打包发版只改这两行：
#   appVersionName 给人看的版本号(也是 APK 文件名 NurseQuiz-<name>-release.apk 和 App 内显示)
#   appVersionCode 系统判断"是否为更新"的整数，每次发版必须 +1
appVersionName=1.2
appVersionCode=3
